<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    border: 3px solid #333;
    image-rendering: pixelated;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

const GRAVITY = 0.45;
const FLAP_VEL = -7.5;
const PIPE_W = 52;
const PIPE_GAP = 140;
const PIPE_SPEED = 2.5;
const GROUND_H = 80;
const BIRD_SIZE = 16;

let gameState = 'start'; // start, playing, dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('flappyBest')) || 0;
let frame = 0;
let pipes = [];
let particles = [];

const bird = {
  x: 80,
  y: H / 2,
  w: BIRD_SIZE,
  h: BIRD_SIZE,
  vel: 0,
  rot: 0,
  wingFrame: 0,
  wingTimer: 0,
};

function resetGame() {
  bird.y = H / 2;
  bird.vel = 0;
  bird.rot = 0;
  bird.wingFrame = 0;
  score = 0;
  pipes = [];
  particles = [];
  frame = 0;
}

function addParticles(x, y, count, color, spread) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 40 + Math.random() * 30,
      maxLife: 40 + Math.random() * 30,
      size: Math.random() * 4 + 2,
      color,
    });
  }
}

function spawnPipe() {
  const minY = 60;
  const maxY = H - GROUND_H - PIPE_GAP - 60;
  const topH = Math.floor(Math.random() * (maxY - minY) + minY);
  pipes.push({
    x: W,
    topH,
    scored: false,
  });
}

function flap() {
  if (gameState === 'start') {
    gameState = 'playing';
  }
  if (gameState === 'playing') {
    bird.vel = FLAP_VEL;
  }
}

function isColliding(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function update() {
  frame++;

  if (gameState === 'playing' || gameState === 'start') {
    bird.vel += GRAVITY;
    bird.y += bird.vel;
    bird.rot = Math.min(Math.PI / 4, Math.max(-Math.PI / 3, bird.vel * 0.08));
    bird.wingTimer++;
    if (bird.wingTimer > 6) {
      bird.wingTimer = 0;
      bird.wingFrame = (bird.wingFrame + 1) % 3;
    }
  }

  if (gameState === 'playing') {
    // ground / ceiling
    if (bird.y + bird.h > H - GROUND_H) {
      bird.y = H - GROUND_H - bird.h;
      addParticles(bird.x + bird.w / 2, H - GROUND_H, 12, '#e8a84c', 4);
      gameOver();
      return;
    }
    if (bird.y < 0) {
      bird.y = 0;
      bird.vel = 0;
    }

    // pipes
    if (frame % 90 === 0) spawnPipe();

    for (let i = pipes.length - 1; i >= 0; i--) {
      const p = pipes[i];
      p.x -= PIPE_SPEED;

      // collision - top pipe
      if (isColliding(bird.x, bird.y, bird.w, bird.h, p.x, 0, PIPE_W, p.topH)) {
        addParticles(bird.x + bird.w / 2, bird.y + bird.h / 2, 20, '#e8a84c', 6);
        gameOver();
        return;
      }
      // collision - bottom pipe
      const bottomY = p.topH + PIPE_GAP;
      const bottomH = H - GROUND_H - bottomY;
      if (isColliding(bird.x, bird.y, bird.w, bird.h, p.x, bottomY, PIPE_W, bottomH)) {
        addParticles(bird.x + bird.w / 2, bird.y + bird.h / 2, 20, '#e8a84c', 6);
        gameOver();
        return;
      }

      // score
      if (!p.scored && p.x + PIPE_W < bird.x) {
        p.scored = true;
        score++;
      }

      if (p.x + PIPE_W < 0) {
        pipes.splice(i, 1);
      }
    }
  }

  if (gameState === 'dead' || gameState === 'playing') {
    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vy += 0.05;
      pt.life--;
      if (pt.life <= 0) particles.splice(i, 1);
    }
  }
}

function gameOver() {
  if (gameState === 'dead') return;
  gameState = 'dead';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('flappyBest', bestScore);
  }
}

// ========== RENDERING ==========

function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawBackground() {
  // sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  grad.addColorStop(0, '#4dc9f6');
  grad.addColorStop(1, '#ace4f8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_H);

  // pixel clouds
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 4; i++) {
    const cx = ((frame * 0.3 + i * 120) % (W + 120)) - 60;
    const cy = 40 + i * 45;
    drawPixelRect(cx, cy, 40, 10, 'rgba(255,255,255,0.5)');
    drawPixelRect(cx + 8, cy - 8, 24, 8, 'rgba(255,255,255,0.5)');
    drawPixelRect(cx + 14, cy - 14, 12, 6, 'rgba(255,255,255,0.5)');
  }
}

function drawGround() {
  drawPixelRect(0, H - GROUND_H, W, GROUND_H, '#ded895');
  drawPixelRect(0, H - GROUND_H, W, 6, '#5a4a2a');
  // dirt pattern
  for (let x = 0; x < W; x += 16) {
    const offset = (frame * 1.5) % 16;
    drawPixelRect(x - offset, H - GROUND_H + 6, 16, 8, '#c4b572');
  }
  // dark strip at very bottom
  drawPixelRect(0, H - 4, W, 4, '#5a4a2a');
}

function drawPipe(x, topH) {
  const rimW = PIPE_W + 8;
  const rimH = 20;

  // top pipe body
  drawPixelRect(x, 0, PIPE_W, topH, '#73bf2e');
  // top pipe highlight
  drawPixelRect(x + 4, 0, 8, topH, '#8ed945');
  // top pipe shadow
  drawPixelRect(x + PIPE_W - 6, 0, 6, topH, '#5a9e1e');
  // top rim
  drawPixelRect(x - 4, topH - rimH, rimW, rimH, '#73bf2e');
  drawPixelRect(x - 2, topH - rimH, rimW - 4, 4, '#8ed945');
  drawPixelRect(x + rimW - 8, topH - rimH, 4, rimH, '#5a9e1e');

  const bottomY = topH + PIPE_GAP;
  const bottomH = H - GROUND_H - bottomY;

  // bottom pipe body
  drawPixelRect(x, bottomY, PIPE_W, bottomH, '#73bf2e');
  drawPixelRect(x + 4, bottomY, 8, bottomH, '#8ed945');
  drawPixelRect(x + PIPE_W - 6, bottomY, 6, bottomH, '#5a9e1e');
  // bottom rim
  drawPixelRect(x - 4, bottomY, rimW, rimH, '#73bf2e');
  drawPixelRect(x - 2, bottomY, rimW - 4, 4, '#8ed945');
  drawPixelRect(x + rimW - 8, bottomY, 4, rimH, '#5a9e1e');
}

function drawBird() {
  const bx = Math.round(bird.x);
  const by = Math.round(bird.y);
  const bw = bird.w;
  const bh = bird.h;

  ctx.save();
  ctx.translate(bx + bw / 2, by + bh / 2);
  ctx.rotate(bird.rot);
  ctx.translate(-bw / 2, -bh / 2);

  // body
  drawPixelRect(0, 0, bw, bh, '#f5c842');
  drawPixelRect(2, 0, bw - 4, bh, '#e8b532');
  // wing
  if (gameState === 'start' || gameState === 'playing') {
    if (bird.wingFrame === 0) {
      drawPixelRect(2, 6, 8, 6, '#e0912e');
    } else if (bird.wingFrame === 1) {
      drawPixelRect(2, 8, 8, 4, '#e0912e');
    } else {
      drawPixelRect(2, 4, 8, 4, '#e0912e');
    }
  } else {
    drawPixelRect(2, 8, 8, 4, '#e0912e');
  }
  // eye
  ctx.fillStyle = '#fff';
  ctx.fillRect(10, 2, 5, 5);
  ctx.fillStyle = '#222';
  ctx.fillRect(12, 3, 3, 3);
  // beak
  drawPixelRect(bw - 2, 5, 4, 4, '#e85d2e');
  drawPixelRect(bw, 6, 2, 2, '#c43d1a');

  ctx.restore();
}

function drawScore() {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 3;
  ctx.font = 'bold 40px monospace';
  ctx.textAlign = 'center';
  ctx.strokeText(score, W / 2, 55);
  ctx.fillText(score, W / 2, 55);
}

function drawStartScreen() {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 4;
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.strokeText('FLAPPY BIRD', W / 2, 180);
  ctx.fillText('FLAPPY BIRD', W / 2, 180);

  ctx.font = '16px monospace';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.strokeText('Click or press SPACE', W / 2, 240);
  ctx.fillText('Click or press SPACE', W / 2, 240);

  // floating bird preview
  const previewY = 310 + Math.sin(frame * 0.04) * 8;
  ctx.save();
  ctx.translate(W / 2 - BIRD_SIZE / 2, previewY);
  ctx.translate(BIRD_SIZE / 2, BIRD_SIZE / 2);
  ctx.rotate(0);
  ctx.translate(-BIRD_SIZE / 2, -BIRD_SIZE / 2);
  drawPixelRect(0, 0, BIRD_SIZE, BIRD_SIZE, '#f5c842');
  drawPixelRect(2, 0, BIRD_SIZE - 4, BIRD_SIZE, '#e8b532');
  drawPixelRect(2, 6, 8, 6, '#e0912e');
  ctx.fillStyle = '#fff';
  ctx.fillRect(10, 2, 5, 5);
  ctx.fillStyle = '#222';
  ctx.fillRect(12, 3, 3, 3);
  drawPixelRect(BIRD_SIZE - 2, 5, 4, 4, '#e85d2e');
  drawPixelRect(BIRD_SIZE, 6, 2, 2, '#c43d1a');
  ctx.restore();

  if (bestScore > 0) {
    ctx.font = '14px monospace';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.strokeText('Best: ' + bestScore, W / 2, 400);
    ctx.fillText('Best: ' + bestScore, W / 2, 400);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  const boxW = 220;
  const boxH = 160;
  const boxX = (W - boxW) / 2;
  const boxY = (H - boxH) / 2 - 20;

  ctx.fillStyle = '#deb887';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeStyle = '#5a4a2a';
  ctx.lineWidth = 4;
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  ctx.fillStyle = '#5a4a2a';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, boxY + 40);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#333';
  ctx.fillText('Score: ' + score, W / 2, boxY + 80);
  ctx.fillText('Best: ' + bestScore, W / 2, boxY + 110);

  ctx.fillStyle = '#5a4a2a';
  ctx.font = '14px monospace';
  ctx.fillText('Click to restart', W / 2, boxY + 145);
}

function drawParticles() {
  for (const pt of particles) {
    const alpha = pt.life / pt.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = pt.color;
    ctx.fillRect(Math.round(pt.x), Math.round(pt.y), Math.round(pt.size), Math.round(pt.size));
  }
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  drawBackground();

  for (const p of pipes) {
    drawPipe(p.x, p.topH);
  }

  drawGround();

  if (gameState !== 'dead') {
    drawBird();
  }

  drawParticles();

  if (gameState === 'dead') {
    drawBird();
    drawGameOver();
  }

  if (gameState === 'playing') {
    drawScore();
  }

  if (gameState === 'start') {
    drawStartScreen();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ========== INPUT ==========

function handleInput(e) {
  if (e) e.preventDefault();
  if (gameState === 'dead') {
    resetGame();
    gameState = 'start';
    return;
  }
  flap();
}

canvas.addEventListener('click', handleInput);
canvas.addEventListener('touchstart', handleInput);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.key === ' ') {
    e.preventDefault();
    handleInput();
  }
});

// ========== START ==========
resetGame();
loop();
</script>
</body>
</html>
