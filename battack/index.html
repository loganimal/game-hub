<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Battack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    border: 3px solid #333;
    image-rendering: pixelated;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 800, H = 500;
canvas.width = W;
canvas.height = H;

const SCROLL_SPEED = 1.8;
const BAT_FIXED_X = 130;

const LEVELS = [
  { name:'Night City',  name2:'Aliens Ahead',      bg:'night',   enemyPool:[{type:'alien',hp:1,spd:1.4}], waves:[3,4,5] },
  { name:'Day City',    name2:'Alien Onslaught',    bg:'day',     enemyPool:[{type:'alien',hp:1,spd:1.8}], waves:[4,5,6,5] },
  { name:'Forest',      name2:'Zombie Infestation', bg:'forest',  enemyPool:[{type:'zombie',hp:3,spd:0.9},{type:'alien',hp:1,spd:1.5}], waves:[3,4,4,5] },
  { name:'Dark Forest', name2:'Final Stand',        bg:'forestN', enemyPool:[{type:'alien',hp:1,spd:1.8},{type:'zombie',hp:3,spd:1.0}], waves:[4,5,5,6,6] },
];

let game = {};

function initGame() {
  game = {
    state:'title', // title | levelIntro | playing | waveClear | levelComplete | gameOver | victory
    level:0,
    wave:0,
    stateTimer:0,
    waveTimer:0,
    waveEnemyIdx:0,
    waveEnemiesSpawned:0,
    waveCleared:false,
    scrollX:0,
    bat:{ x:BAT_FIXED_X, y:250, w:36, h:30, vy:0, speed:4, hearts:3, maxHearts:3, wingFrame:0, wingTimer:0, invincible:0, flash:0, },
    enemies:[],
    poops:[],
    missiles:[],
    particles:[],
    lasers:[],
    score:0,
    shakeTimer:0,
    shakeIntensity:0,
    cooldowns:{ laser:0, poo:0, missile:0 },
    frame:0,
    waveText:'',
    waveTextTimer:0,
  };
}

function getLevel() { return LEVELS[game.level]; }
function getWave() { return getLevel().waves[game.wave]; }

// ─── PARTICLES ──────────────────────────────────────────────
function spawnParticles(x,y,color,count,spd) {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*spd+1;
    game.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:25+Math.random()*20,maxLife:40,size:Math.random()*3+2,color});
  }
}

function updateParticles() {
  for (let i=game.particles.length-1;i>=0;i--) {
    const p=game.particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life--;
    if (p.life<=0) game.particles.splice(i,1);
  }
}

function drawParticles() {
  for (const p of game.particles) {
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(Math.round(p.x),Math.round(p.y),Math.round(p.size),Math.round(p.size));
  }
  ctx.globalAlpha=1;
}

// ─── AUDIO ──────────────────────────────────────────────────
let actx=null;
function initAudio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }
function sfx(freq,dur,type,vol){
  try{
    initAudio(); const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination); const t=actx.currentTime;
    o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol||0.15,t); g.gain.exponentialRampToValueAtTime(0.01,t+(dur||0.08));
    o.start(t); o.stop(t+(dur||0.08));
  }catch(_){}
}
function sfxShoot(){ sfx(800,0.05,'square',0.1); }
function sfxHit(){ sfx(200,0.12,'sawtooth',0.2); }
function sfxExplode(){ sfx(100,0.2,'sawtooth',0.15); }
function sfxWaveClear(){ sfx(523,0.1,'sine',0.12); setTimeout(()=>sfx(659,0.1,'sine',0.12),100); }
function sfxLevelClear(){ sfx(523,0.12,'sine',0.12); setTimeout(()=>sfx(659,0.12,'sine',0.12),120); setTimeout(()=>sfx(784,0.15,'sine',0.12),240); }
function sfxDeath(){ sfx(150,0.3,'sawtooth',0.2); }

// ─── INPUT ──────────────────────────────────────────────────
const keys={}, just={};
window.addEventListener('keydown',e=>{
  if(!keys[e.code]) just[e.code]=true;
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });
function consume(code){ if(just[code]){ just[code]=false; return true; } return false; }
canvas.addEventListener('click',()=>handleAction());
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleAction();});

// ─── COLLISION ──────────────────────────────────────────────
function overlap(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ─── SPAWN ──────────────────────────────────────────────────
function spawnEnemy() {
  const pool=getLevel().enemyPool;
  const pick=pool.length===1?pool[0]:pool[Math.floor(Math.random()*pool.length)];
  const y=40+Math.random()*(H-120);
  game.enemies.push({
    type:pick.type,
    x:W+20, y,
    w:pick.type==='zombie'?30:28,
    h:pick.type==='zombie'?44:30,
    hp:pick.hp, maxHp:pick.hp,
    spd:pick.spd*(0.85+Math.random()*0.3),
    anim:Math.random()*Math.PI*2,
    flash:0,
  });
}

function startWave() {
  const wc=getWave();
  game.waveEnemyIdx=0;
  game.waveEnemiesSpawned=0;
  game.waveTimer=80;
  game.waveCleared=false;
}

function checkWave() {
  const wc=getWave();
  if (!game.waveCleared && game.waveEnemiesSpawned>=wc && game.enemies.length===0) {
    game.waveCleared=true;
    sfxWaveClear();
    game.waveText='WAVE CLEAR!';
    game.waveTextTimer=50;
    game.state='waveClear';
    game.stateTimer=60;
  }
}

// ─── UPDATE ─────────────────────────────────────────────────
function update() {
  game.frame++;
  const b=game.bat;

  if (game.shakeTimer>0) game.shakeTimer--;

  // Cooldowns
  for (const k in game.cooldowns) if (game.cooldowns[k]>0) game.cooldowns[k]--;

  if (b.invincible>0) b.invincible--;
  if (b.flash>0) b.flash--;

  // Timers
  if (game.waveTextTimer>0) game.waveTextTimer--;

  switch (game.state) {

    case 'title':
      if (consume('Space') || consume('Enter')) {
        initAudio();
        startGame();
      }
      break;

    case 'levelIntro':
      game.stateTimer--;
      if (game.stateTimer<=0) {
        game.state='playing';
        startWave();
      }
      break;

    case 'playing':
      // Scroll
      game.scrollX+=SCROLL_SPEED;

      // Bat movement
      b.vy=0;
      if (keys['ArrowUp']) b.vy=-b.speed;
      if (keys['ArrowDown']) b.vy=b.speed;
      b.y+=b.vy;
      if (b.y<20) b.y=20;
      if (b.y+b.h>H-20) b.y=H-20-b.h;

      // Wing animation
      b.wingTimer++;
      if (b.wingTimer>5) { b.wingTimer=0; b.wingFrame=(b.wingFrame+1)%3; }

      // Shooting
      if (game.cooldowns.laser<=0) {
        if (keys['Space']) {
          game.cooldowns.laser=10;
          const lx=b.x+b.w, ly=b.y+b.h/2-3;
          game.lasers.push({x:lx,y:ly,w:W-lx,h:6,life:6});
          sfxShoot();
          // Check instant hit
          for (const e of game.enemies) {
            if (e.x>lx && overlap({x:lx,y:ly,w:W-lx,h:6},e)) {
              e.hp--; e.flash=6; sfxHit();
              spawnParticles(e.x+e.w/2,e.y+e.h/2,'#ff0',4,2);
            }
          }
        }
      }

      if (consume('KeyZ') && game.cooldowns.poo<=0) {
        game.cooldowns.poo=90; // ~1.5s
        game.poops.push({x:b.x+b.w/2-5,y:b.y+b.h, w:10,h:12, vy:0, life:60 });
        sfx(300,0.08,'sine',0.1);
      }

      if (consume('KeyX') && game.cooldowns.missile<=0) {
        game.cooldowns.missile=150; // ~2.5s
        game.missiles.push({x:b.x+b.w, y:b.y+b.h/2-5, w:16,h:10, vx:6, life:80 });
        sfx(600,0.06,'square',0.1);
      }

      // Update lasers
      for (let i=game.lasers.length-1;i>=0;i--) {
        game.lasers[i].life--;
        if (game.lasers[i].life<=0) game.lasers.splice(i,1);
      }

      // Update poops
      for (let i=game.poops.length-1;i>=0;i--) {
        const p=game.poops[i]; p.vy+=0.3; p.y+=p.vy; p.life--;
        if (p.y>H-30 || p.life<=0) {
          spawnParticles(p.x+5,p.y,'#5a3a1a',8,3);
          // Splash damage
          for (const e of game.enemies) {
            if (Math.abs(e.x+e.w/2-(p.x+5))<50 && Math.abs(e.y+e.h/2-p.y)<50) {
              e.hp--; e.flash=6; sfxHit();
              spawnParticles(e.x+e.w/2,e.y+e.h/2,'#8a5a2a',5,3);
            }
          }
          sfxExplode();
          game.poops.splice(i,1); continue;
        }
        // Hit enemy directly
        for (let j=game.enemies.length-1;j>=0;j--) {
          const e=game.enemies[j];
          if (overlap(p,e)) {
            e.hp--; e.flash=6;
            spawnParticles(e.x+e.w/2,e.y+e.h/2,'#8a5a2a',6,3);
            sfxHit();
            game.poops.splice(i,1);
            break;
          }
        }
      }

      // Update missiles
      for (let i=game.missiles.length-1;i>=0;i--) {
        const m=game.missiles[i]; m.x+=m.vx; m.life--;
        if (m.x>W+20 || m.life<=0) { game.missiles.splice(i,1); continue; }
        let hit=false;
        for (let j=game.enemies.length-1;j>=0;j--) {
          const e=game.enemies[j];
          if (overlap(m,e)) {
            e.hp-=2; e.flash=8;
            spawnParticles(e.x+e.w/2,e.y+e.h/2,'#f60',12,4);
            spawnParticles(e.x+e.w/2,e.y+e.h/2,'#ff0',8,3);
            sfxExplode(); sfxHit();
            game.missiles.splice(i,1);
            hit=true; break;
          }
        }
        if (hit) continue;
      }

      // Wave spawning
      const wc=getWave();
      if (game.waveEnemiesSpawned<wc) {
        game.waveTimer--;
        if (game.waveTimer<=0) {
          spawnEnemy();
          game.waveEnemiesSpawned++;
          game.waveTimer=Math.max(20,70-game.waveEnemiesSpawned*5);
        }
      }

      // Update enemies
      for (let i=game.enemies.length-1;i>=0;i--) {
        const e=game.enemies[i];
        if (e.flash>0) e.flash--;
        e.anim+=0.04;
        // Movement
        if (e.type==='alien') {
          e.x-=e.spd;
          e.y+=Math.sin(e.anim)*0.8;
        } else {
          e.x-=e.spd;
        }
        // Bound Y
        if (e.y<30) e.y=30;
        if (e.y+e.h>H-20) e.y=H-20-e.h;

        // Collision with bat
        if (b.invincible<=0 && overlap(b,e)) {
          b.hearts--;
          b.invincible=45;
          b.flash=10;
          sfxHit();
          sfxDeath();
          game.shakeTimer=8;
          game.shakeIntensity=5;
          spawnParticles(b.x+b.w/2,b.y+b.h/2,'#f44',12,4);
          e.hp-=3; // kill the enemy
          if (b.hearts<=0) {
            game.state='gameOver';
            game.stateTimer=120;
            sfxDeath();
            return;
          }
        }

        // Remove dead or off-screen
        if (e.hp<=0) {
          if (e.hp<=0) {
            spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type==='zombie'?'#5a3a1a':'#4a4',10,4);
            game.score+=e.type==='zombie'?30:10;
          }
          game.enemies.splice(i,1);
          continue;
        }
        if (e.x+e.w<0) { game.enemies.splice(i,1); continue; }
      }

      checkWave();
      updateParticles();
      break;

    case 'waveClear':
      game.stateTimer--;
      updateParticles();
      if (game.stateTimer<=0) {
        const lv=getLevel();
        if (game.wave>=lv.waves.length-1) {
          // Level complete
          if (game.level>=LEVELS.length-1) {
            game.state='victory';
            game.stateTimer=180;
            sfxLevelClear();
          } else {
            game.state='levelComplete';
            game.stateTimer=100;
            sfxLevelClear();
          }
        } else {
          game.wave++;
          game.state='playing';
          startWave();
        }
      }
      break;

    case 'levelComplete':
      game.stateTimer--;
      updateParticles();
      if (game.stateTimer<=0) {
        game.level++;
        game.wave=0;
        game.bat.hearts=game.bat.maxHearts;
        nextLevel();
      }
      break;

    case 'gameOver':
      game.stateTimer--;
      if (consume('Space')||consume('Enter')) {
        game.state='title';
      }
      break;

    case 'victory':
      game.stateTimer--;
      if (game.frame%4===0) spawnParticles(Math.random()*W,Math.random()*H/2,['#ff0','#f44','#0f0','#44f','#f0f'][Math.floor(Math.random()*5)],3,2);
      updateParticles();
      if (game.stateTimer<=0 && (consume('Space')||consume('Enter'))) {
        game.state='title';
      }
      break;
  }
}

// ─── DRAW ───────────────────────────────────────────────────
function drawBgSection(src,dst,color) {
  ctx.fillStyle=color;
  ctx.fillRect(dst.x,dst.y,dst.w,dst.h);
}

function drawBackground() {
  const bg=getLevel().bg;
  const sx=game.scrollX;

  if (bg==='night' || bg==='forestN') {
    // Sky
    const grad=ctx.createLinearGradient(0,0,0,H);
    if (bg==='night') { grad.addColorStop(0,'#0a0a2e'); grad.addColorStop(1,'#1a1a3e'); }
    else { grad.addColorStop(0,'#050515'); grad.addColorStop(1,'#0d1520'); }
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

    // Stars
    ctx.fillStyle='rgba(255,255,255,0.6)';
    for (let i=0;i<40;i++) {
      const px=(i*47+13*7)%W|0, py=(i*31+17*5)%(H-80)|0;
      const flicker=Math.sin(game.frame*0.02+i)*0.4+0.6;
      ctx.globalAlpha=flicker*0.6;
      ctx.fillRect(px,py,2,2);
    }
    ctx.globalAlpha=1;

    if (bg==='night') {
      // Moon
      ctx.fillStyle='rgba(220,220,200,0.9)';
      ctx.beginPath(); ctx.arc(650,60,30,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#0a0a2e';
      ctx.beginPath(); ctx.arc(640,55,26,0,Math.PI*2); ctx.fill();

      // Buildings
      for (let i=0;i<8;i++) {
        const bx=((i*120)-sx*0.4)%(W+160)-80|0, bw=60+((i*17)%40), bh=80+((i*23)%120);
        ctx.fillStyle='#1a1a2e';
        ctx.fillRect(bx,H-110-bh,bw,bh);
        ctx.strokeStyle='#2a2a4e';
        ctx.lineWidth=1;
        ctx.strokeRect(bx,H-110-bh,bw,bh);
        // Windows
        for (let wy=H-110-bh+8;wy<H-120;wy+=16) {
          for (let wx=bx+6;wx<bx+bw-8;wx+=14) {
            if (((wx*7+wy*13)|0)%5!==0) {
              ctx.fillStyle=`rgba(255,200,100,${0.3+Math.sin(game.frame*0.01+wx+wy)*0.2})`;
              ctx.fillRect(wx,wy,8,10);
            }
          }
        }
      }
    } else {
      // Dark forest - trees
      for (let i=0;i<12;i++) {
        const tx=((i*80)-sx*0.3)%(W+200)-100|0;
        ctx.fillStyle='#0a1a0a';
        ctx.fillRect(tx+3,H-80,8,60);
        ctx.beginPath(); ctx.arc(tx+7,H-90,25+((i*13)%15),0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#0d200d';
        ctx.beginPath(); ctx.arc(tx-5,H-85,18+((i*7)%10),0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx+18,H-85,16+((i*11)%8),0,Math.PI*2); ctx.fill();
      }
      // Fireflies
      for (let i=0;i<8;i++) {
        const fx=((i*137+50)-sx*0.2)%(W+60)-30|0, fy=80+((i*73)%(H-160));
        ctx.fillStyle=`rgba(200,255,100,${0.3+Math.sin(game.frame*0.05+i*2)*0.3})`;
        ctx.beginPath(); ctx.arc(fx,fy+Math.sin(game.frame*0.03+i)*15,3,0,Math.PI*2); ctx.fill();
      }
    }
  } else if (bg==='day'||bg==='forest') {
    // Sky
    const grad=ctx.createLinearGradient(0,0,0,H);
    if (bg==='day') { grad.addColorStop(0,'#4dc9f6'); grad.addColorStop(1,'#ace4f8'); }
    else { grad.addColorStop(0,'#87CEEB'); grad.addColorStop(1,'#b8e6b8'); }
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

    if (bg==='day') {
      // Clouds
      ctx.fillStyle='rgba(255,255,255,0.5)';
      for (let i=0;i<4;i++) {
        const cx=((i*180+50)-sx*0.2)%(W+160)-80|0, cy=30+((i*37)%50);
        ctx.fillRect(cx,cy,50,10); ctx.fillRect(cx+10,cy-8,30,8); ctx.fillRect(cx+16,cy-14,18,6);
      }
      // Buildings
      for (let i=0;i<8;i++) {
        const bx=((i*120)-sx*0.4)%(W+160)-80|0, bw=60+((i*17)%40), bh=80+((i*23)%120);
        ctx.fillStyle='#8a8a9a'; ctx.fillRect(bx,H-110-bh,bw,bh);
        ctx.strokeStyle='#6a6a7a'; ctx.lineWidth=1; ctx.strokeRect(bx,H-110-bh,bw,bh);
        for (let wy=H-110-bh+8;wy<H-120;wy+=16) {
          for (let wx=bx+6;wx<bx+bw-8;wx+=14) {
            if (((wx*7+wy*13)|0)%5!==0) { ctx.fillStyle='#6688bb'; ctx.fillRect(wx,wy,8,10); }
          }
        }
      }
      // Sun
      ctx.fillStyle='rgba(255,220,50,0.6)';
      ctx.beginPath(); ctx.arc(700,50,35,0,Math.PI*2); ctx.fill();
    } else {
      // Forest day trees
      for (let i=0;i<10;i++) {
        const tx=((i*90)-sx*0.3)%(W+200)-100|0;
        ctx.fillStyle='#5a3a1a'; ctx.fillRect(tx+3,H-80,8,60);
        ctx.fillStyle='#3a7a2a';
        ctx.beginPath(); ctx.arc(tx+7,H-90,30+((i*13)%15),0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#4a8a3a';
        ctx.beginPath(); ctx.arc(tx-5,H-85,20+((i*7)%10),0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx+18,H-85,18+((i*11)%8),0,Math.PI*2); ctx.fill();
      }
    }
  }

  // Ground
  const grassColor=bg==='night'||bg==='forestN'?'#0a1a0a':bg==='day'?'#6a8a3a':'#4a8a3a';
  ctx.fillStyle=grassColor; ctx.fillRect(0,H-20,W,20);
  ctx.fillStyle=bg==='night'||bg==='forestN'?'#152015':'#5a7a2a';
  ctx.fillRect(0,H-20,W,3);

  // Ground details
  for (let i=0;i<20;i++) {
    const gx=((i*45)-sx*1.5)%(W+40)-20|0;
    ctx.fillStyle=bg==='night'||bg==='forestN'?'rgba(20,40,20,0.5)':'rgba(40,80,20,0.4)';
    ctx.fillRect(gx,H-18,3,4); ctx.fillRect(gx+6,H-16,2,3);
  }
}

function drawBat() {
  const b=game.bat;
  if (b.flash>0 && b.flash%4<2) return;

  const bx=Math.round(b.x), by=Math.round(b.y);

  ctx.save();
  ctx.translate(bx+b.w/2,by+b.h/2);

  // Body
  ctx.fillStyle='#2a1a3a';
  ctx.beginPath(); ctx.ellipse(0,0,16,12,0,0,Math.PI*2); ctx.fill();
  // Inner body
  ctx.fillStyle='#3a2a4a';
  ctx.beginPath(); ctx.ellipse(0,2,12,8,0,0,Math.PI*2); ctx.fill();

  // Wings
  const wingUp=game.bat.wingFrame===0?0:game.bat.wingFrame===1?-6:-12;
  ctx.fillStyle='#1a0a2a';
  // Left wing
  ctx.beginPath();
  ctx.moveTo(-8,0);
  ctx.lineTo(-24,wingUp-4);
  ctx.lineTo(-28,wingUp+10);
  ctx.lineTo(-12,6);
  ctx.fill();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(8,0);
  ctx.lineTo(24,wingUp-4);
  ctx.lineTo(28,wingUp+10);
  ctx.lineTo(12,6);
  ctx.fill();

  // Ears
  ctx.fillStyle='#1a0a2a';
  ctx.beginPath(); ctx.moveTo(-8,-10); ctx.lineTo(-5,-18); ctx.lineTo(-2,-10); ctx.fill();
  ctx.beginPath(); ctx.moveTo(2,-10); ctx.lineTo(5,-18); ctx.lineTo(8,-10); ctx.fill();

  // Eyes - laser eyes glow
  if (keys['Space'] && game.state==='playing') {
    ctx.fillStyle='#f00';
    ctx.shadowColor='#f00'; ctx.shadowBlur=12;
  } else {
    ctx.fillStyle='#d22';
    ctx.shadowColor='#d22'; ctx.shadowBlur=6;
  }
  ctx.beginPath(); ctx.arc(-4,-3,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-3,4,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // Pupils
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-3,-3,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-3,1.5,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawLaserBeam() {
  for (const l of game.lasers) {
    ctx.fillStyle='rgba(255,50,50,0.8)';
    ctx.shadowColor='#f00'; ctx.shadowBlur=15;
    ctx.fillRect(l.x,l.y,l.w,4);
    ctx.fillStyle='rgba(255,200,200,0.5)';
    ctx.fillRect(l.x,l.y,l.w,2);
    ctx.shadowBlur=0;
  }
}

function drawEnemies() {
  for (const e of game.enemies) {
    const x=Math.round(e.x), y=Math.round(e.y);
    if (e.flash>0 && e.flash%4<2) {
      ctx.globalAlpha=0.5;
    }

    if (e.type==='alien') {
      // Body
      ctx.fillStyle='#3a5a3a';
      ctx.beginPath(); ctx.ellipse(x+e.w/2,y+e.h/2,14,12,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#4a6a4a';
      ctx.beginPath(); ctx.ellipse(x+e.w/2,y+e.h/2+2,10,8,0,0,Math.PI*2); ctx.fill();
      // Eyes
      ctx.fillStyle='#ff0';
      ctx.beginPath(); ctx.arc(x+e.w/2-5,y+e.h/2-3,4,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+e.w/2+5,y+e.h/2-3,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath(); ctx.arc(x+e.w/2-4,y+e.h/2-3,2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+e.w/2+6,y+e.h/2-3,2,0,Math.PI*2); ctx.fill();
      // Antenna
      ctx.strokeStyle='#4a6a4a'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+e.w/2,y+e.h/2-12); ctx.lineTo(x+e.w/2-3,y+e.h/2-16); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+e.w/2,y+e.h/2-12); ctx.lineTo(x+e.w/2+3,y+e.h/2-16); ctx.stroke();
      ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(x+e.w/2-3,y+e.h/2-16,2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(x+e.w/2+3,y+e.h/2-16,2,0,Math.PI*2); ctx.fill();
    } else {
      // Zombie
      ctx.fillStyle='#4a3a2a';
      ctx.fillRect(x+4,y,22,8); // head
      ctx.fillRect(x+6,y+8,18,28); // body
      ctx.fillRect(x+2,y+28,8,16); // left leg
      ctx.fillRect(x+20,y+28,8,16); // right leg
      ctx.fillRect(x-2,y+10,8,18); // left arm
      ctx.fillRect(x+24,y+10,8,18); // right arm
      // Eyes
      ctx.fillStyle='#8f4';
      ctx.beginPath(); ctx.arc(x+9,y+6,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+21,y+6,3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111';
      ctx.beginPath(); ctx.arc(x+10,y+6,1.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+22,y+6,1.5,0,Math.PI*2); ctx.fill();
      // Mouth
      ctx.fillStyle='#2a1a0a';
      ctx.fillRect(x+10,y+12,10,3);
      // Ripped clothes
      ctx.fillStyle='#5a4a3a';
      ctx.fillRect(x+8,y+14,14,2);
      ctx.fillRect(x+9,y+18,12,2);
    }
    ctx.globalAlpha=1;
  }
}

function drawPoops() {
  for (const p of game.poops) {
    ctx.fillStyle='#5a3a1a';
    ctx.fillRect(Math.round(p.x),Math.round(p.y),p.w,p.h);
    ctx.fillStyle='#7a5a2a';
    ctx.fillRect(Math.round(p.x)+2,Math.round(p.y)+2,p.w-4,p.h-4);
  }
}

function drawMissiles() {
  for (const m of game.missiles) {
    ctx.fillStyle='#f60';
    ctx.shadowColor='#f60'; ctx.shadowBlur=10;
    ctx.fillRect(Math.round(m.x),Math.round(m.y),m.w,m.h);
    ctx.fillStyle='#ff0';
    ctx.fillRect(Math.round(m.x)+2,Math.round(m.y)+2,m.w-4,m.h-4);
    // Flame
    ctx.fillStyle='#f44';
    ctx.fillRect(Math.round(m.x)-4,Math.round(m.y)+2,4,6);
    ctx.shadowBlur=0;
  }
}

function drawHUD() {
  const b=game.bat;

  // Hearts
  for (let i=0;i<b.maxHearts;i++) {
    const hx=15+i*28, hy=15;
    if (i<b.hearts) {
      ctx.fillStyle='#f44';
      ctx.beginPath(); ctx.arc(hx,hy,10,i<2?0.2:0,i<2?2.94:0.2); ctx.fill();
      ctx.beginPath(); ctx.arc(hx+10,hy,10,2.94,0.2); ctx.fill();
      ctx.fillStyle='#f66';
      ctx.fillRect(hx-2,hy-2,4,4);
    } else {
      ctx.fillStyle='#444';
      ctx.beginPath(); ctx.arc(hx,hy,10,0.2,2.94); ctx.fill();
      ctx.beginPath(); ctx.arc(hx+10,hy,10,2.94,0.2); ctx.fill();
    }
  }

  // Score
  ctx.fillStyle='#fff';
  ctx.font='16px monospace';
  ctx.textAlign='center';
  ctx.fillText('SCORE: '+game.score,W/2,22);

  // Wave info
  const lv=getLevel();
  ctx.textAlign='right';
  ctx.fillStyle='#aaa';
  ctx.font='14px monospace';
  ctx.fillText(lv.name+' - Wave '+(game.wave+1)+'/'+lv.waves.length,W-15,22);

  // Ammo
  ctx.textAlign='left';
  ctx.font='12px monospace';
  ctx.fillStyle=game.cooldowns.poo<=0?'#8a5a2a':'#555';
  ctx.fillText('Z:Poo '+((game.cooldowns.poo<=0)?'[READY]':'['+Math.ceil(game.cooldowns.poo/60)+'s]'),15,50);
  ctx.fillStyle=game.cooldowns.missile<=0?'#f60':'#555';
  ctx.fillText('X:Missile '+((game.cooldowns.missile<=0)?'[READY]':'['+Math.ceil(game.cooldowns.missile/60)+'s]'),15,68);
}

function drawText(txt,size,y,color,shadow) {
  ctx.textAlign='center';
  if (shadow) {
    ctx.fillStyle='#000'; ctx.font='bold '+(size+2)+'px monospace';
    ctx.fillText(txt,W/2+2,y+2);
  }
  ctx.fillStyle=color||'#fff'; ctx.font='bold '+size+'px monospace';
  ctx.fillText(txt,W/2,y);
}

function drawTitle() {
  drawBackground();
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  drawText('BATTACK',64,140,'#f44',true);
  drawText('A Bat with Laser Eyes',20,185,'#faa',false);
  drawText('↑↓ Fly   SPACE Shoot   Z Poo   X Missile',15,260,'#aaa',false);
  if (Math.floor(game.frame/40)%2===0) drawText('PRESS SPACE TO START',20,340,'#ff0',true);
  if (localStorage.getItem('battackBest')) {
    drawText('Best Score: '+localStorage.getItem('battackBest'),14,390,'#888',false);
  }
}

function drawLevelIntro() {
  drawBackground();
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
  const lv=getLevel();
  drawText('Level '+(game.level+1),42,170,'#ff0',true);
  drawText(lv.name,32,220,'#fff',true);
  drawText(lv.name2,18,270,'#aaa',false);
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
  drawText('GAME OVER',48,200,'#f44',true);
  drawText('Score: '+game.score,22,260,'#fff',false);
  const best=Math.max(game.score,parseInt(localStorage.getItem('battackBest')||'0'));
  localStorage.setItem('battackBest',best);
  drawText('Best: '+best,18,295,'#ff0',false);
  if (Math.floor(game.frame/40)%2===0) drawText('PRESS SPACE',18,360,'#aaa',false);
}

function drawVictory() {
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
  drawParticles();
  drawText('YOU WIN!',52,150,'#ff0',true);
  drawText('All levels cleared!',22,210,'#fff',false);
  drawText('Score: '+game.score,22,260,'#f44',false);
  const best=Math.max(game.score,parseInt(localStorage.getItem('battackBest')||'0'));
  localStorage.setItem('battackBest',best);
  drawText('Best: '+best,18,295,'#ff0',false);
  if (game.stateTimer<=0 && Math.floor(game.frame/40)%2===0) drawText('PRESS SPACE TO CONTINUE',16,380,'#aaa',false);
}

function draw() {
  ctx.save();

  // Screen shake
  if (game.shakeTimer>0) {
    ctx.translate((Math.random()-0.5)*game.shakeIntensity,(Math.random()-0.5)*game.shakeIntensity);
  }

  switch (game.state) {
    case 'title': drawTitle(); break;
    case 'levelIntro': drawLevelIntro(); break;
    case 'playing':
    case 'waveClear':
    case 'levelComplete':
      drawBackground();
      drawPoops();
      drawMissiles();
      drawEnemies();
      drawBat();
      drawLaserBeam();
      drawParticles();
      drawHUD();
      if (game.waveTextTimer>0) {
        ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,H);
        drawText(game.waveText,40,220,'#ff0',true);
      }
      if (game.state==='levelComplete') {
        ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,H);
        drawText('LEVEL COMPLETE!',40,210,'#4f4',true);
        drawText('Score: '+game.score,22,270,'#fff',false);
      }
      break;
    case 'gameOver': drawBackground(); drawParticles(); drawGameOver(); break;
    case 'victory': drawVictory(); break;
  }

  ctx.restore();
}

// ─── STATE HELPERS ──────────────────────────────────────────
function startGame() {
  game.level=0; game.wave=0; game.score=0;
  game.bat.hearts=game.bat.maxHearts;
  game.bat.y=250;
  game.bat.vy=0;
  game.bat.invincible=0;
  game.bat.flash=0;
  game.enemies=[];
  game.poops=[];
  game.missiles=[];
  game.lasers=[];
  game.particles=[];
  game.scrollX=0;
  game.cooldowns={laser:0,poo:0,missile:0};
  nextLevel();
}

function nextLevel() {
  game.state='levelIntro';
  game.stateTimer=90;
  game.wave=0;
  game.enemies=[];
  game.poops=[];
  game.missiles=[];
  game.lasers=[];
  game.particles=[];
  game.scrollX=0;
  game.cooldowns={laser:0,poo:0,missile:0};
}

// ─── INPUT HELPER ───────────────────────────────────────────
function handleAction() {
  if (game.state==='title') { initAudio(); startGame(); }
}

// ─── LOOP ───────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown',e=>{
  if (e.code==='Space'||e.key==='Enter') {
    if (game.state==='title') { e.preventDefault(); initAudio(); startGame(); }
    if (game.state==='gameOver'||game.state==='victory') e.preventDefault();
  }
});

initGame();
loop();
</script>
</body>
</html>
