<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teenage Mutant Crocodile Ninja Fighters</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 4px solid #4a4a6a;
            background: #87CEEB;
            image-rendering: pixelated;
        }
        #instructions {
            color: #fff;
            margin-top: 10px;
            font-size: 14px;
        }
        #instructions span {
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="instructions">
            <span>⬅️ ➡️ Move</span>
            <span>⬆️ Jump</span>
            <span>SPACE Attack</span>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
